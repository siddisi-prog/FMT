apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-management
  namespace: healthcare-platform
  labels:
    app: asset-management
    app.kubernetes.io/part-of: healthcare-asset-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asset-management
  template:
    metadata:
      labels:
        app: asset-management
    spec:
      containers:
        - name: asset-management
          image: ghcr.io/your-org/healthcare-asset-platform/asset-management:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-secret
                  key: url
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-config
                  key: brokers
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: asset-management
  namespace: healthcare-platform
spec:
  selector:
    app: asset-management
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
  type: ClusterIP
